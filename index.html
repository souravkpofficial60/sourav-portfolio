<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sourav KP | Portfolio</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2 style="color:#00ff88;">&gt;_ SKP</h2>
  </nav>

  <!-- HERO -->
  <section id="hero" style="text-align:center; padding:50px;">

    <img src="photo.jpg" alt="Sourav KP" class="hero-photo" style="width:200px; border-radius:50%;" />

    <h1>Sourav KP</h1>
    <p>BCA Student | Developer | Cybersecurity Enthusiast</p>

  </section>

  <!-- CONTACT -->
  <section id="contact" style="padding:50px; text-align:center;">
    <h2>Contact Me</h2>

    <form id="contactForm">
      <input type="text" name="name" placeholder="Name" required /><br><br>
      <input type="email" name="email" placeholder="Email" required /><br><br>
      <textarea name="message" placeholder="Message" required></textarea><br><br>

      <!-- ✅ FIXED BUTTON -->
      <button type="submit" id="submitBtn">Send Message</button>
    </form>

    <p id="formStatus"></p>
  </section>

  <!-- ✅ SCRIPT (IMPORTANT) -->
  <script src="script.js" defer></script>

</body>
</html>
